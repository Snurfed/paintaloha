<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Aloha Cards - Paint Aloha</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #333;
        }

        .header {
            background: rgba(0,0,0,0.3);
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header a {
            color: white;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
        }

        .header img {
            height: 40px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 30px 20px;
        }

        .page-title {
            text-align: center;
            color: white;
            margin-bottom: 10px;
            font-size: 2.5rem;
        }

        .page-subtitle {
            text-align: center;
            color: rgba(255,255,255,0.7);
            margin-bottom: 40px;
            font-size: 1.1rem;
        }

        .templates-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            margin-bottom: 40px;
        }

        .template-card {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .template-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.4);
        }

        .template-card.selected {
            ring: 4px solid #FF6B00;
            box-shadow: 0 0 0 4px #FF6B00;
        }

        .template-preview {
            height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #f0f4f8, #e2e8f0);
            padding: 20px;
        }

        .template-preview svg {
            max-width: 100%;
            max-height: 100%;
        }

        .template-info {
            padding: 20px;
        }

        .template-name {
            font-size: 1.2rem;
            font-weight: 700;
            color: #1a1a2e;
            margin-bottom: 5px;
        }

        .template-desc {
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 10px;
        }

        .template-difficulty {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .difficulty-easy {
            background: #d4edda;
            color: #155724;
        }

        .difficulty-medium {
            background: #fff3cd;
            color: #856404;
        }

        .preview-panel {
            background: white;
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            display: none;
        }

        .preview-panel.active {
            display: block;
        }

        .preview-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .preview-title {
            font-size: 1.8rem;
            color: #1a1a2e;
        }

        .close-btn {
            background: #eee;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 1.5rem;
            cursor: pointer;
            color: #666;
        }

        .preview-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
        }

        @media (max-width: 768px) {
            .preview-content {
                grid-template-columns: 1fr;
            }
        }

        .preview-3d {
            background: linear-gradient(135deg, #f8f9fa, #e9ecef);
            border-radius: 16px;
            padding: 30px;
            text-align: center;
            min-height: 300px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .preview-3d h3 {
            margin-bottom: 20px;
            color: #1a1a2e;
        }

        .preview-flat {
            background: #f8f9fa;
            border-radius: 16px;
            padding: 30px;
        }

        .preview-flat h3 {
            margin-bottom: 20px;
            color: #1a1a2e;
        }

        .preview-flat svg {
            width: 100%;
            height: auto;
        }

        .instructions {
            margin-top: 30px;
            padding: 20px;
            background: #f0f7ff;
            border-radius: 12px;
        }

        .instructions h4 {
            color: #1a1a2e;
            margin-bottom: 10px;
        }

        .instructions ol {
            margin-left: 20px;
            color: #555;
        }

        .instructions li {
            margin-bottom: 5px;
        }

        .legend {
            display: flex;
            gap: 20px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            color: #555;
        }

        .legend-line {
            width: 30px;
            height: 3px;
        }

        .legend-cut {
            background: #e63946;
        }

        .legend-fold-mountain {
            background: repeating-linear-gradient(90deg, #2563eb, #2563eb 5px, transparent 5px, transparent 10px);
        }

        .legend-fold-valley {
            background: repeating-linear-gradient(90deg, #10b981, #10b981 3px, transparent 3px, transparent 8px);
        }

        .btn {
            display: inline-block;
            padding: 15px 40px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 1.1rem;
            text-decoration: none;
            cursor: pointer;
            border: none;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #FF6B00, #FF8C00);
            color: white;
            box-shadow: 0 10px 30px rgba(255, 107, 0, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 40px rgba(255, 107, 0, 0.4);
        }

        .btn-row {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 30px;
        }

        /* 3D Preview Animation */
        .card-3d-container {
            perspective: 1000px;
            width: 200px;
            height: 150px;
        }

        .card-3d {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            animation: rotate3d 10s infinite linear;
        }

        @keyframes rotate3d {
            0% { transform: rotateY(0deg) rotateX(10deg); }
            100% { transform: rotateY(360deg) rotateX(10deg); }
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            border-radius: 8px;
        }

        .print-template {
            display: none;
        }

        @media print {
            body * {
                visibility: hidden;
            }
            .print-template, .print-template * {
                visibility: visible;
            }
            .print-template {
                display: block;
                position: absolute;
                left: 0;
                top: 0;
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <a href="index.html">
            <img src="logo.png" alt="Paint Aloha">
        </a>
        <a href="index.html" style="font-size: 0.9rem; opacity: 0.8;">← Back to Home</a>
    </header>

    <div class="container">
        <h1 class="page-title">3D Aloha Cards</h1>
        <p class="page-subtitle">Print, cut, and fold beautiful Hawaii-themed pop-up cards</p>

        <div class="templates-grid" id="templatesGrid">
            <!-- Templates will be inserted here -->
        </div>

        <div class="preview-panel" id="previewPanel">
            <div class="preview-header">
                <h2 class="preview-title" id="previewTitle">Template Preview</h2>
                <button class="close-btn" onclick="closePreview()">×</button>
            </div>

            <div class="preview-content">
                <div class="preview-3d">
                    <h3>3D Preview</h3>
                    <div id="preview3d"></div>
                </div>

                <div class="preview-flat">
                    <h3>Print Template</h3>
                    <div id="previewFlat"></div>
                    <div class="legend">
                        <div class="legend-item">
                            <div class="legend-line legend-cut"></div>
                            <span>Cut line</span>
                        </div>
                        <div class="legend-item">
                            <div class="legend-line legend-fold-mountain"></div>
                            <span>Mountain fold</span>
                        </div>
                        <div class="legend-item">
                            <div class="legend-line legend-fold-valley"></div>
                            <span>Valley fold</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="instructions">
                <h4>Assembly Instructions</h4>
                <ol id="instructionsList">
                </ol>
            </div>

            <div class="btn-row">
                <button class="btn btn-primary" onclick="printTemplate()">Print Template</button>
            </div>
        </div>
    </div>

    <div class="print-template" id="printTemplate"></div>

        let selectedTemplate = null;

        function renderTemplates() {
            const grid = document.getElementById('templatesGrid');
            grid.innerHTML = templates.map(t => `
                <div class="template-card" onclick="selectTemplate('${t.id}')">
                    <div class="template-preview">
                        ${t.svg}
                    </div>
                    <div class="template-info">
                        <div class="template-name">${t.name}</div>
                        <div class="template-desc">${t.description}</div>
                        <span class="template-difficulty difficulty-${t.difficulty}">${t.difficulty}</span>
                    </div>
                </div>
            `).join('');
        }

        function selectTemplate(id) {
            selectedTemplate = templates.find(t => t.id === id);
            if (!selectedTemplate) return;

            document.getElementById('previewTitle').textContent = selectedTemplate.name;

            // 3D Preview (simple animated representation)
            document.getElementById('preview3d').innerHTML = `
                <div class="card-3d-container">
                    <div class="card-3d">
                        <div class="card-face" style="background: linear-gradient(135deg, #ff9a9e, #fecfef); transform: translateZ(50px);">
                            ${selectedTemplate.preview3d}
                        </div>
                    </div>
                </div>
                <p style="margin-top: 20px; color: #666; font-size: 0.9rem;">Rotating preview</p>
            `;

            // Flat template
            document.getElementById('previewFlat').innerHTML = selectedTemplate.svg;

            // Instructions
            document.getElementById('instructionsList').innerHTML = selectedTemplate.instructions
                .map(inst => `<li>${inst}</li>`).join('');

            document.getElementById('previewPanel').classList.add('active');
            document.getElementById('previewPanel').scrollIntoView({ behavior: 'smooth' });
        }

        function closePreview() {
            document.getElementById('previewPanel').classList.remove('active');
            selectedTemplate = null;
        }

        function printTemplate() {
            if (!selectedTemplate) return;

            const printDiv = document.getElementById('printTemplate');
            printDiv.innerHTML = `
                <div style="padding: 20px; text-align: center;">
                    <h1 style="margin-bottom: 10px;">${selectedTemplate.name}</h1>
                    <p style="margin-bottom: 20px; color: #666;">Paint Aloha - 3D Card Template</p>
                    <div style="max-width: 600px; margin: 0 auto;">
                        ${selectedTemplate.svg}
                    </div>
                    <div style="margin-top: 30px; text-align: left; max-width: 500px; margin-left: auto; margin-right: auto;">
                        <h3>Instructions:</h3>
                        <ol style="margin-left: 20px;">
                            ${selectedTemplate.instructions.map(i => `<li>${i}</li>`).join('')}
                        </ol>
                        <div style="margin-top: 20px; display: flex; gap: 20px;">
                            <div><span style="display: inline-block; width: 30px; height: 3px; background: #e63946; vertical-align: middle;"></span> Cut</div>
                            <div><span style="display: inline-block; width: 30px; height: 3px; background: repeating-linear-gradient(90deg, #2563eb, #2563eb 5px, transparent 5px, transparent 10px); vertical-align: middle;"></span> Mountain fold</div>
                            <div><span style="display: inline-block; width: 30px; height: 3px; background: repeating-linear-gradient(90deg, #10b981, #10b981 3px, transparent 3px, transparent 8px); vertical-align: middle;"></span> Valley fold</div>
                        </div>
                    </div>
                </div>
            `;

            window.print();
        }

        // Initialize
        renderTemplates();
    </script>
</body>
</html>
